<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport & display ──────────────────────────────────────────── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />

    <!-- ── Standard favicon ────────────────────────────────────────────── -->
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ── PWA manifest (Vite plugin injects this; explicit ref is a belt-
         and-suspenders fallback for browsers that don't pick it up) ───── -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- ── Theme & status bar ──────────────────────────────────────────── -->
    <!-- Base orange — matches primary CTA and manifest theme_color -->
    <meta name="theme-color" content="#ff6b1f" />
    <!-- iOS: transparent status bar so the atmospheric gradient bleeds up -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Planify" />

    <!-- ── iOS home screen icon ────────────────────────────────────────── -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ── iOS splash screens ──────────────────────────────────────────── -->
    <!-- One image covers the base case; iOS uses background_color from
         manifest for any uncovered device size. -->
    <link
      rel="apple-touch-startup-image"
      href="/splash.png"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/splash.png"
      media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/splash.png"
      media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)"
    />

    <!-- ── Windows tile ────────────────────────────────────────────────── -->
    <meta name="msapplication-TileColor" content="#ff6b1f" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />

    <!-- ── SEO / social ────────────────────────────────────────────────── -->
    <meta name="description" content="Planificá tu próximo viaje en 10 preguntas. Tu viaje ideal, con IA." />
    <meta property="og:title" content="Planify — Tu viaje ideal" />
    <meta property="og:description" content="10 preguntas. Tu viaje ideal. Planeá con IA." />
    <meta property="og:image" content="/splash.png" />

    <title>Planify</title>

    <!-- ── Fonts ───────────────────────────────────────────────────────── -->
    <!-- Cargadas desde el HTML (no @import en CSS) para que el navegador las
         descubra de inmediato y las baje en paralelo con el bundle JS — el
         @import encadenaba CSS bundle → CSS de Google → fuentes en serie. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&family=Syne:wght@600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
    />

    <!-- ── Startup background ──────────────────────────────────────────── -->
    <!-- Prevent white flash before React mounts by matching the app's
         atmospheric gradient exactly on the document body. -->
    <style>
      /* Startup background on html only — prevents white flash before the CSS
         bundle loads. body is left transparent so it never overrides html's
         atmospheric gradient (index.css sets the full complex version on html
         with background-attachment:fixed; body having its own background caused
         the mid-scroll background switch regression on long screens). */
      html {
        background: linear-gradient(180deg, #8178a8 0%, #c49ba2 35%, #ff8c42 70%, #ff6b1f 100%);
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Splash estático: pinta contenido real apenas llega el HTML (FCP
           inmediato) en lugar de esperar a que el bundle JS monte React.
           createRoot().render() lo reemplaza por la app. -->
      <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center">
        <span
          style="
            font-family: 'Syne', system-ui, sans-serif;
            font-weight: 700;
            font-size: 2rem;
            color: #fff;
            letter-spacing: -0.02em;
          "
          >Planify</span
        >
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
